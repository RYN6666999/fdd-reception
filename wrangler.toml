name = "fdd-reception"
main = "functions/_worker.ts"
compatibility_date = "2024-09-23"

[assets]
directory = "."
not_found_handling = "none"

[[d1_databases]]
binding = "DB"
database_name = "fdd-reception"
database_id = "6b780531-c882-4415-8425-be84e5c52074"

[[durable_objects.bindings]]
name = "SESSION_ROOM"
class_name = "SessionRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SessionRoom"]

[triggers]
crons = ["* * * * *", "0 2 * * *"]

[vars]
BASE_URL = "https://fdd-reception.workers.dev"
