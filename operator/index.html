<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>房多多收件</title>
  <meta name="theme-color" content="#1a1a1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="收件">
  <link rel="manifest" href="/operator/manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="ws-status" hidden>連線中斷，重新連線中...</div>

  <!-- Tab 導航 -->
  <nav id="tab-nav">
    <button class="tab-btn active" data-tab="current">目前客戶</button>
    <button class="tab-btn" data-tab="history">歷史記錄</button>
  </nav>

  <!-- ===== 目前客戶 Tab ===== -->
  <div id="tab-current" class="tab-panel">

    <div id="view-idle">
      <button id="btn-issue">發送收件連結</button>
    </div>

    <div id="view-waiting" hidden>
      <p>等待客戶填寫中...</p>
      <div id="qrcode-container"></div>
      <div id="short-url-display"></div>
      <div class="btn-row">
        <button id="btn-copy-url">複製連結</button>
        <button id="btn-cancel-waiting" class="secondary">取消</button>
      </div>
    </div>

    <div id="view-reviewing" hidden>
      <section>
        <h3>持卡人</h3>
        <div class="field" data-field="name"><span class="label">姓名</span><span class="value"></span></div>
        <div class="field" data-field="id_number"><span class="label">身分證</span><span class="value"></span></div>
        <div class="field" data-field="birth_date"><span class="label">生日</span><span class="value"></span></div>
      </section>
      <section>
        <h3>卡片資訊</h3>
        <div class="field" data-field="card_last4"><span class="label">卡號末四碼</span><span class="value"></span></div>
        <div class="field" data-field="expiry"><span class="label">有效期限</span><span class="value"></span></div>
        <div class="field" data-field="cvv"><span class="label">CVV</span><span class="value">••••</span></div>
        <div class="field" data-field="installment"><span class="label">分期</span><span class="value"></span></div>
      </section>
      <section>
        <button id="btn-show-full-card">確認看全號</button>
      </section>
      <button id="btn-destroy-reviewing" class="secondary">結案</button>
    </div>

    <div id="view-confirming" hidden>
      <p>完整卡號（請核對）：</p>
      <div id="full-card-number" class="card-number-display"></div>
      <p>請確認卡號無誤後按下確認。</p>
      <div class="btn-row">
        <button id="btn-confirm-ok">確認無誤</button>
        <button id="btn-confirm-back" class="secondary">資料有誤</button>
      </div>
    </div>

    <div id="view-done" hidden>
      <p>已確認完成。</p>
      <button id="btn-done-close">結案</button>
    </div>

    <div id="view-error" hidden></div>

  </div>

  <!-- ===== 歷史記錄 Tab ===== -->
  <div id="tab-history" class="tab-panel" hidden>
    <div id="history-list">
      <p class="loading-text">載入中...</p>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script type="module" src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/operator/sw.js', { scope: '/operator/' })
    }
  </script>
</body>
</html>
